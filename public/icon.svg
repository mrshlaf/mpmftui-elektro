  <!-- Pediment / triangle -->
  <polygon points="256,68 408,140 104,140" fill="white" opacity="0.9"/>
  <!-- Base -->
  <rect x="88" y="388" width="336" height="44" rx="10" fill="white"/>
  <!-- Star accent -->
