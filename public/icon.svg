  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Pillar left -->
  <rect x="120" y="180" width="48" height="220" rx="8" fill="white" opacity="0.95"/>
  <!-- Pillar center -->
